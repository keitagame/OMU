<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>OMU</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      @font-face {
  font-family: "Renner";

}

      }

      }

  </head>
  <body>
    <header>
      <h1>OM-16</h1>
      <label class="file-label">
        Select
        <input id="rom" type="file" class="file-input" />
      </label>
      <span id="file-name"></span>
      <button id="fullscreenBtn">Fullscreen</button>
      <button id="start">Start</button>
      <div class="mono" id="status">Waiting...</div>
      <div>
        <span class="mono">CPU PC:</span>
        <span id="pc" class="mono">0x0000</span>
      </div>
    </header>
    <div class="row">
      <canvas id="screen" width="256" height="240"></canvas>
      <div style="display:none">
        <div><b>FPS:</b> <span id="fps">0</span></div>
        <div><b>Cycles:</b> <span id="cyc" class="mono">0</span></div>
      </div>
    </div>

    <script>
      class CPU {
    constructor(bus) {
        this.bus = bus; // メモリ/PPU/APU へアクセスするバス

        // 汎用レジスタ R0〜R7
        this.R = new Uint16Array(8);

        // 特殊レジスタ
        this.PC = 0x060000; // IPL開始
        this.SP = 0x1FFFF;  // WRAM上のスタック
        this.SR = 0x00;     // フラグ
        this.BR = 0x00;     // バンクレジスタ
        this.DP = 0x0000;   // ダイレクトページ

        // サイクルカウンタ（後でPPU/APUと同期）
        this.cycles = 0;
    }

    // -----------------------------
    // メモリアクセス
    // -----------------------------
    read8(addr) {
        return this.bus.read8(addr);
    }

    read16(addr) {
        const lo = this.bus.read8(addr);
        const hi = this.bus.read8((addr + 1) & 0xFFFFFF);
        return (hi << 8) | lo;
    }

    write8(addr, value) {
        this.bus.write8(addr, value & 0xFF);
    }

    write16(addr, value) {
        this.bus.write8(addr, value & 0xFF);
        this.bus.write8((addr + 1) & 0xFFFFFF, value >> 8);
    }

    // -----------------------------
    // 命令フェッチ（可変長）
    // -----------------------------
    fetch() {
        const op = this.read8(this.PC);
        this.PC = (this.PC + 1) & 0xFFFFFF;

        const size = this.opcodeLength(op);
        const bytes = [op];

        for (let i = 1; i < size; i++) {
            bytes.push(this.read8(this.PC));
            this.PC = (this.PC + 1) & 0xFFFFFF;
        }

        return bytes;
    }

    // 命令長テーブル（仮）
    opcodeLength(op) {
        // ここは後で 68命令の正式テーブルに置き換える
        if (op === 0x00) return 1; // NOP
        if (op === 0x10) return 2; // LDA #imm8
        if (op === 0x11) return 3; // LDA #imm16
        if (op === 0x30) return 3; // JMP abs
        if (op === 0x31) return 4; // JMP long
        return 1;
    }

    // -----------------------------
    // デコード & 実行
    // -----------------------------
    step() {
        const bytes = this.fetch();
        const op = bytes[0];

        switch (op) {
            case 0x00: // NOP
                this.cycles += 2;
                break;

            case 0x10: // LDA #imm8 → R0
                this.R[0] = bytes[1];
                this.updateNZ(this.R[0]);
                this.cycles += 2;
                break;

            case 0x11: // LDA #imm16 → R0
                this.R[0] = (bytes[2] << 8) | bytes[1];
                this.updateNZ(this.R[0]);
                this.cycles += 3;
                break;

            case 0x30: { // JMP abs
                const addr = (bytes[2] << 8) | bytes[1];
                this.PC = addr;
                this.cycles += 3;
                break;
            }

            case 0x31: { // JMP long
                const addr = (bytes[3] << 16) | (bytes[2] << 8) | bytes[1];
                this.PC = addr;
                this.cycles += 4;
                break;
            }

            default:
                console.warn("Unknown opcode:", op.toString(16));
                break;
        }
    }

    // -----------------------------
    // フラグ更新
    // -----------------------------
    updateNZ(value) {
        if (value === 0) this.SR |= 0x02; // Z
        else this.SR &= ~0x02;

        if (value & 0x8000) this.SR |= 0x80; // N
        else this.SR &= ~0x80;
    }
}
class PPU {
    constructor(bus) {
        this.bus = bus;

        // スキャンライン / Hカウンタ
        this.scanline = 0;   // 0〜261
        this.hcounter = 0;   // 0〜340

        // レジスタ
        this.ctrl = 0;
        this.mask = 0;
        this.status = 0;

        this.vramAddr = 0;
        this.vramInc = 1;

        this.oamAddr = 0;
        this.cgAddr = 0;

        // スクロール
        this.bgScroll = [
            { x: 0, y: 0 },
            { x: 0, y: 0 },
            { x: 0, y: 0 },
            { x: 0, y: 0 }
        ];

        // BGベースアドレス
        this.bgBase = [0, 0, 0, 0];

        // フレームバッファ（256×240）
        this.framebuffer = new Uint32Array(256 * 240);
    }

    // -----------------------------
    // レジスタ読み書き
    // -----------------------------
    read(addr) {
        switch (addr) {
            case 0x031002: // PPUSTAT
                return this.status;
            case 0x031030: // SCANLINE
                return this.scanline;
            case 0x031032: // HCOUNTER
                return this.hcounter;
            case 0x03103A: // CGDATA (読み)
                return this.readCGRAM();
        }
        return 0xFF;
    }

    write(addr, value) {
        value &= 0xFF;

        switch (addr) {
            case 0x031000: this.ctrl = value; break;
            case 0x031001: this.mask = value; break;

            case 0x031004: // VRAMADDR low
                this.vramAddr = (this.vramAddr & 0xFF00) | value;
                break;
            case 0x031005: // VRAMADDR high
                this.vramAddr = (this.vramAddr & 0x00FF) | (value << 8);
                break;

            case 0x031008: this.vramInc = value; break;

            case 0x03100A: this.oamAddr = value; break;
            case 0x03100C: this.writeOAM(value); break;

            case 0x031010: this.bgScroll[0].x = value; break;
            case 0x031012: this.bgScroll[0].y = value; break;
            case 0x031014: this.bgScroll[1].x = value; break;
            case 0x031016: this.bgScroll[1].y = value; break;
            case 0x031018: this.bgScroll[2].x = value; break;
            case 0x03101A: this.bgScroll[2].y = value; break;
            case 0x03101C: this.bgScroll[3].x = value; break;
            case 0x03101E: this.bgScroll[3].y = value; break;

            case 0x031020: this.bgBase[0] = value; break;
            case 0x031022: this.bgBase[1] = value; break;
            case 0x031024: this.bgBase[2] = value; break;
            case 0x031026: this.bgBase[3] = value; break;

            case 0x031034: this.writeINIDISP(value); break;

            case 0x031038: this.cgAddr = value; break;
            case 0x03103A: this.writeCGRAM(value); break;
        }
    }

    // -----------------------------
    // VRAM / OAM / CGRAM アクセス
    // -----------------------------
    readVRAM() {
        const v = this.bus.vram[this.vramAddr];
        this.vramAddr = (this.vramAddr + this.vramInc) & 0xFFFF;
        return v;
    }

    writeVRAM(value) {
        this.bus.vram[this.vramAddr] = value;
        this.vramAddr = (this.vramAddr + this.vramInc) & 0xFFFF;
    }

    writeOAM(value) {
        const addr = this.oamAddr & 0x3FF;
        this.bus.oam[addr] = value;
        this.oamAddr = (this.oamAddr + 1) & 0x3FF;
    }

    writeCGRAM(value) {
        const addr = this.cgAddr & 0x1FF;
        this.bus.cgram[addr] = value;
        this.cgAddr = (this.cgAddr + 1) & 0x1FF;
    }

    readCGRAM() {
        const addr = this.cgAddr & 0x1FF;
        const v = this.bus.cgram[addr];
        this.cgAddr = (this.cgAddr + 1) & 0x1FF;
        return v;
    }

    // -----------------------------
    // スキャンライン進行
    // -----------------------------
    step() {
        this.hcounter++;

        if (this.hcounter >= 341) {
            this.hcounter = 0;
            this.scanline++;

            if (this.scanline === 240) {
                this.status |= 0x80; // VBlank
            }

            if (this.scanline >= 262) {
                this.scanline = 0;
                this.status &= ~0x80; // VBlank解除
                this.renderFrame();
            }
        }
    }

    // -----------------------------
    // フレーム描画（最小）
    // -----------------------------
    renderFrame() {
        // とりあえず背景色だけ塗る
        const bgColor = this.readBGColor();
        this.framebuffer.fill(bgColor);
    }

    readBGColor() {
        const lo = this.bus.cgram[0];
        const hi = this.bus.cgram[1];
        const color = (hi << 8) | lo;
        return this.convertBGR15toRGBA(color);
    }

    convertBGR15toRGBA(c) {
        const r = (c & 0x1F) << 3;
        const g = ((c >> 5) & 0x1F) << 3;
        const b = ((c >> 10) & 0x1F) << 3;
        return (255 << 24) | (b << 16) | (g << 8) | r;
    }

    // -----------------------------
    // Canvas へ描画
    // -----------------------------
    render(ctx) {
        const img = ctx.createImageData(256, 240);
        const buf = new Uint32Array(img.data.buffer);
        buf.set(this.framebuffer);
        ctx.putImageData(img, 0, 0);
    }
}
class FMChannel {
    constructor() {
        this.keyOn = false;
        this.freq = 0;
        this.alg = 0;
        this.operators = [
            new FMOperator(),
            new FMOperator(),
            new FMOperator(),
            new FMOperator()
        ];
    }

    writeKey(value) {
        this.keyOn = !!(value & 0x80);
    }

    writeFreq(value) {
        this.freq = value; // 仮
    }

    writeAlg(value) {
        this.alg = value & 0x07;
    }

    write(offset, value) {
        // FM0OP0〜OP3 の設定が来る
        const opIndex = Math.floor(offset / 4);
        if (opIndex < 4) {
            this.operators[opIndex].write(offset % 4, value);
        }
    }

    step() {
        // まだ音を生成しない
    }

    outputL() { return 0; }
    outputR() { return 0; }
}
class FMOperator {
    constructor() {
        this.mul = 1;
        this.tl = 0;
        this.ar = 0;
        this.dr = 0;
        this.sl = 0;
        this.rr = 0;
    }

    write(offset, value) {
        // 後で実装
    }

    step() {
        // 後で実装
    }

    output() {
        return 0;
    }
}
class PCMChannel {
    constructor(bus) {
        this.bus = bus;

        this.addr = 0;     // サンプルアドレス (24bit)
        this.length = 0;   // サンプル長
        this.freq = 0;     // 再生周波数
        this.control = 0;  // 再生/ループ/ADPCM/音量
        this.position = 0; // 現在の再生位置
        this.playing = false;
    }

    write(offset, value) {
        switch (offset) {
            case 0: // ADDR low
                this.addr = (this.addr & 0xFFFF00) | value;
                break;
            case 1: // ADDR mid
                this.addr = (this.addr & 0xFF00FF) | (value << 8);
                break;
            case 2: // ADDR high
                this.addr = (this.addr & 0x00FFFF) | (value << 16);
                break;

            case 3: // LEN low
                this.length = (this.length & 0xFF00) | value;
                break;
            case 4: // LEN high
                this.length = (this.length & 0x00FF) | (value << 8);
                break;

            case 5: // FREQ
                this.freq = value;
                break;

            case 6: // CTL
                this.control = value;
                this.playing = !!(value & 0x80);
                break;

            case 7: // unused / volume high?
                break;
        }
    }

    step() {
        if (!this.playing) return;

        // まだ音を生成しない（後で実装）
        this.position++;

        if (this.position >= this.length) {
            if (this.control & 0x40) {
                // ループ
                this.position = 0;
            } else {
                this.playing = false;
            }
        }
    }

    outputL() { return 0; }
    outputR() { return 0; }
}
class PSGSquare {
    constructor() {
        this.period = 0;
        this.volume = 0;
        this.duty = 0;
        this.phase = 0;
    }

    write(offset, value) {
        switch (offset) {
            case 0: this.period = (this.period & 0xFF00) | value; break;
            case 1: this.period = (this.period & 0x00FF) | ((value & 0x0F) << 8); break;
            case 2: this.volume = value; break;
            case 3: this.duty = value & 0x03; break;
        }
    }

    step() {
        this.phase++;
    }

    outputL() { return 0; }
    outputR() { return 0; }
}
class PSGNoise {
    constructor() {
        this.volume = 0;
        this.lfsr = 0xACE1; // 初期値
    }

    write(offset, value) {
        if (offset === 2) this.volume = value;
    }

    step() {
        // LFSR 更新（後で実装）
        const bit = ((this.lfsr >> 15) ^ (this.lfsr >> 14)) & 1;
        this.lfsr = ((this.lfsr << 1) | bit) & 0xFFFF;
    }

    outputL() { return 0; }
    outputR() { return 0; }
}

class APU {
    constructor(bus) {
        this.bus = bus;

        // APU 全体制御
        this.enabled = true;
        this.muted = false;
        this.masterVolume = 15;

        // FM / PCM / PSG の各音源
        this.fm = new FMUnit();
        this.pcm = new PCMUnit(bus);
        this.psg = new PSGUnit();

        // ミックス比率
        this.mixFM = 1.0;
        this.mixPCM = 1.0;
        this.mixPSG = 1.0;

        // APU 状態
        this.busy = false;

        // WebAudio 出力
        this.sampleRate = 44100;
        this.bufferL = new Float32Array(1024);
        this.bufferR = new Float32Array(1024);
        this.bufferPos = 0;
    }

    // -----------------------------
    // レジスタ読み書き
    // -----------------------------
    read(addr) {
        switch (addr) {
            case 0x032002: // APUSTAT
                return this.busy ? 0x80 : 0x00;
        }
        return 0xFF;
    }

    write(addr, value) {
        value &= 0xFF;

        switch (addr) {
            case 0x032000: // APUCTL
                this.enabled = !!(value & 0x80);
                this.muted = !!(value & 0x40);
                this.masterVolume = value & 0x0F;
                break;

            case 0x032004: // APUMIX
                this.mixFM  = ((value >> 4) & 0x03) / 3;
                this.mixPCM = ((value >> 2) & 0x03) / 3;
                this.mixPSG = (value & 0x03) / 3;
                break;

            // FM チャンネル 0
            case 0x032010: this.fm.writeKey(0, value); break;
            case 0x032012: this.fm.writeFreq(0, value); break;
            case 0x032014: this.fm.writeAlg(0, value); break;

            // FM チャンネル 1〜3（+0x18）
            default:
                if (addr >= 0x032040 && addr < 0x032080) {
                    const ch = Math.floor((addr - 0x032040) / 0x18) + 1;
                    const off = (addr - 0x032040) % 0x18;
                    this.fm.write(ch, off, value);
                }

                // PCM チャンネル 0〜3（+0x8）
                else if (addr >= 0x032080 && addr < 0x0320C0) {
                    const ch = Math.floor((addr - 0x032080) / 8);
                    const off = (addr - 0x032080) % 8;
                    this.pcm.write(ch, off, value);
                }

                // PSG チャンネル 0〜3（+0x8）
                else if (addr >= 0x0320C0 && addr < 0x032100) {
                    const ch = Math.floor((addr - 0x0320C0) / 8);
                    const off = (addr - 0x0320C0) % 8;
                    this.psg.write(ch, off, value);
                }
        }
    }

    // -----------------------------
    // APU ステップ（CPU サイクルに同期）
    // -----------------------------
    step() {
        if (!this.enabled || this.muted) return;

        // FM / PCM / PSG の内部更新
        this.fm.step();
        this.pcm.step();
        this.psg.step();

        // 44.1kHz でサンプル生成
        this.generateSample();
    }

    // -----------------------------
    // サンプル生成（ステレオ）
    // -----------------------------
    generateSample() {
        const l = (
            this.fm.outputL()  * this.mixFM +
            this.pcm.outputL() * this.mixPCM +
            this.psg.outputL() * this.mixPSG
        ) * (this.masterVolume / 15);

        const r = (
            this.fm.outputR()  * this.mixFM +
            this.pcm.outputR() * this.mixPCM +
            this.psg.outputR() * this.mixPSG
        ) * (this.masterVolume / 15);

        this.bufferL[this.bufferPos] = l;
        this.bufferR[this.bufferPos] = r;

        this.bufferPos++;

        if (this.bufferPos >= this.bufferL.length) {
            this.flushAudio();
            this.bufferPos = 0;
        }
    }

    // -----------------------------
    // WebAudio にバッファを送る
    // -----------------------------
    flushAudio() {
        // 後で実装（AudioWorklet or ScriptProcessor）
    }
}
class FMUnit {
    constructor() {
        this.channels = [
            new FMChannel(),
            new FMChannel(),
            new FMChannel(),
            new FMChannel()
        ];
    }

    writeKey(ch, value) { this.channels[ch].writeKey(value); }
    writeFreq(ch, value) { this.channels[ch].writeFreq(value); }
    writeAlg(ch, value) { this.channels[ch].writeAlg(value); }

    write(ch, off, value) {
        this.channels[ch].write(off, value);
    }

    step() {
        for (const ch of this.channels) ch.step();
    }

    outputL() {
        return this.channels.reduce((a, c) => a + c.outputL(), 0);
    }

    outputR() {
        return this.channels.reduce((a, c) => a + c.outputR(), 0);
    }
}
class PCMUnit {
    constructor(bus) {
        this.bus = bus;
        this.channels = [
            new PCMChannel(bus),
            new PCMChannel(bus),
            new PCMChannel(bus),
            new PCMChannel(bus)
        ];
    }

    write(ch, off, value) {
        this.channels[ch].write(off, value);
    }

    step() {
        for (const ch of this.channels) ch.step();
    }

    outputL() {
        return this.channels.reduce((a, c) => a + c.outputL(), 0);
    }

    outputR() {
        return this.channels.reduce((a, c) => a + c.outputR(), 0);
    }
}
class PSGUnit {
    constructor() {
        this.channels = [
            new PSGSquare(),
            new PSGSquare(),
            new PSGSquare(),
            new PSGNoise()
        ];
    }

    write(ch, off, value) {
        this.channels[ch].write(off, value);
    }

    step() {
        for (const ch of this.channels) ch.step();
    }

    outputL() {
        return this.channels.reduce((a, c) => a + c.outputL(), 0);
    }

    outputR() {
        return this.channels.reduce((a, c) => a + c.outputR(), 0);
    }
}

class Bus {
    constructor(romBanks) {
        // メモリ領域
        this.wram  = new Uint8Array(0x20000);  // 128KB
        this.sram  = new Uint8Array(0x8000);   // 32KB
        this.vram  = new Uint8Array(0x10000);  // 64KB
        this.oam   = new Uint8Array(0x400);    // 1KB
        this.cgram = new Uint8Array(0x200);    // 512B
        this.ipl   = new Uint8Array(0x10000);  // 64KB (Bank0固定ROM)

        // ROMバンク（32KB × 256）
        this.rom = romBanks; // romBanks[bank][offset]

        // デバイス
        this.ppu = null;
        this.apu = null;
        this.dma = null;
        this.io  = null;

        // CPU が書き換えるバンクレジスタ
        this.bankRegister = 0;
    }

    // CPU からバンク番号を設定
    setBank(bank) {
        this.bankRegister = bank & 0xFF;
    }

    // -----------------------------
    // 8bit 読み取り
    // -----------------------------
    read8(addr) {
        addr &= 0xFFFFFF;

        if (addr < 0x020000) return this.wram[addr];
        if (addr < 0x028000) return this.sram[addr - 0x020000];
        if (addr < 0x030000) return 0xFF; // 予約領域

        if (addr < 0x030020) return this.io?.read(addr) ?? 0xFF;
        if (addr < 0x031100) return this.ppu?.read(addr) ?? 0xFF;
        if (addr < 0x032100) return this.apu?.read(addr) ?? 0xFF;
        if (addr < 0x033010) return this.dma?.read(addr) ?? 0xFF;

        if (addr < 0x040000) return 0xFF; // 予約領域
        if (addr < 0x050000) return this.vram[addr - 0x040000];
        if (addr < 0x050400) return this.oam[addr - 0x050000];
        if (addr < 0x050600) return this.cgram[addr - 0x050400];

        if (addr < 0x060000) return 0xFF;
        if (addr < 0x070000) return this.ipl[addr - 0x060000];

        // ROMバンク領域
        const bank = this.bankRegister;
        const offset = addr - 0x070000;
        return this.rom[bank][offset] ?? 0xFF;
    }

    // -----------------------------
    // 8bit 書き込み
    // -----------------------------
    write8(addr, value) {
        addr &= 0xFFFFFF;
        value &= 0xFF;

        if (addr < 0x020000) { this.wram[addr] = value; return; }
        if (addr < 0x028000) { this.sram[addr - 0x020000] = value; return; }
        if (addr < 0x030000) return;

        if (addr < 0x030020) { this.io?.write(addr, value); return; }
        if (addr < 0x031100) { this.ppu?.write(addr, value); return; }
        if (addr < 0x032100) { this.apu?.write(addr, value); return; }
        if (addr < 0x033010) { this.dma?.write(addr, value); return; }

        if (addr < 0x040000) return;
        if (addr < 0x050000) { this.vram[addr - 0x040000] = value; return; }
        if (addr < 0x050400) { this.oam[addr - 0x050000] = value; return; }
        if (addr < 0x050600) { this.cgram[addr - 0x050400] = value; return; }

        // ROM/予約領域は書き込み不可
    }

    // -----------------------------
    // 16bit 読み書き（CPU用）
    // -----------------------------
    read16(addr) {
        const lo = this.read8(addr);
        const hi = this.read8(addr + 1);
        return (hi << 8) | lo;
    }

    write16(addr, value) {
        this.write8(addr, value & 0xFF);
        this.write8(addr + 1, value >> 8);
    }
}
class Controller {
    constructor() {
        this.state = 0xFFFF;   // 現在のボタン状態（1=離す, 0=押す）
        this.latched = 0xFFFF; // ラッチされた16bit
    }

    // ボタン入力を更新（外部から呼ぶ）
    setButtons(buttons) {
        let v = 0xFFFF;

        if (buttons.B)      v &= ~(1 << 15);
        if (buttons.Y)      v &= ~(1 << 14);
        if (buttons.SELECT) v &= ~(1 << 13);
        if (buttons.START)  v &= ~(1 << 12);
        if (buttons.UP)     v &= ~(1 << 11);
        if (buttons.DOWN)   v &= ~(1 << 10);
        if (buttons.LEFT)   v &= ~(1 << 9);
        if (buttons.RIGHT)  v &= ~(1 << 8);
        if (buttons.A)      v &= ~(1 << 7);
        if (buttons.X)      v &= ~(1 << 6);
        if (buttons.L)      v &= ~(1 << 5);
        if (buttons.R)      v &= ~(1 << 4);

        this.state = v;
    }

    // ラッチ（VBlank または手動）
    latch() {
        this.latched = this.state;
    }

    // 16bit 一括読み出し
    read() {
        return this.latched;
    }
}
class IO {
    constructor(bus) {
        this.bus = bus;

        this.joy1 = new Controller();
        this.joy2 = new Controller();

        this.hwVersion = 0x01; // 仮
        this.isNTSC = true;

        // タイマー
        this.timer0 = 0;
        this.timerRunning = false;
        this.timerIRQ = false;

        // IRQ 状態
        this.irqAPU = false;
        this.irqTimer = false;
        this.irqExternal = false;
    }

    // -----------------------------
    // 読み取り
    // -----------------------------
    read(addr) {
        switch (addr) {
            case 0x030000: return this.joy1.read() & 0xFF;
            case 0x030001: return (this.joy1.read() >> 8) & 0xFF;

            case 0x030002: return this.joy2.read() & 0xFF;
            case 0x030003: return (this.joy2.read() >> 8) & 0xFF;

            case 0x030008: // HWREG
                return (this.isNTSC ? 0x80 : 0x00) | (this.hwVersion & 0x0F);

            case 0x03000A: return this.timer0 & 0xFF;
            case 0x03000B: return (this.timer0 >> 8) & 0xFF;
            case 0x03000C: return (this.timer0 >> 16) & 0xFF;
            case 0x03000D: return (this.timer0 >> 24) & 0xFF;

            case 0x030010: // IRQSTAT
                return (this.irqAPU ? 0x04 : 0) |
                       (this.irqTimer ? 0x02 : 0) |
                       (this.irqExternal ? 0x01 : 0);
        }
        return 0xFF;
    }

    // -----------------------------
    // 書き込み
    // -----------------------------
    write(addr, value) {
        value &= 0xFF;

        switch (addr) {
            case 0x030004: this.joy1.latch(); break;
            case 0x030006: this.joy2.latch(); break;

            case 0x03000A:
                this.timer0 = (this.timer0 & 0xFFFFFF00) | value;
                break;
            case 0x03000B:
                this.timer0 = (this.timer0 & 0xFFFF00FF) | (value << 8);
                break;
            case 0x03000C:
                this.timer0 = (this.timer0 & 0xFF00FFFF) | (value << 16);
                break;
            case 0x03000D:
                this.timer0 = (this.timer0 & 0x00FFFFFF) | (value << 24);
                break;

            case 0x03000E: // TIMERCTL
                this.timerRunning = !!(value & 0x01);
                this.timerIRQ = !!(value & 0x02);
                break;

            case 0x030012: // IRQCLR
                if (value & 0x04) this.irqAPU = false;
                if (value & 0x02) this.irqTimer = false;
                if (value & 0x01) this.irqExternal = false;
                break;

            case 0x030014: // BANKSEL
                this.bus.setBank(value);
                break;

            case 0x030016: // PORTEXP
                // 拡張ポート（未実装）
                break;
        }
    }

    // -----------------------------
    // タイマー更新（CPU サイクルごと）
    // -----------------------------
    step() {
        if (this.timerRunning) {
            this.timer0 = (this.timer0 + 1) >>> 0;

            if (this.timerIRQ) {
                this.irqTimer = true;
            }
        }
    }
}
class DMA {
    constructor(bus) {
        this.bus = bus;

        this.control = 0;   // DMACTL
        this.src = 0;       // DMASRC (24bit)
        this.dst = 0;       // DMADST (24bit)
        this.count = 0;     // DMACNT (16bit)
        this.active = false; // DMASTAT bit0
    }

    // -----------------------------
    // レジスタ読み書き
    // -----------------------------
    read(addr) {
        switch (addr) {
            case 0x03300C: // DMASTAT
                return this.active ? 1 : 0;
        }
        return 0xFF;
    }

    write(addr, value) {
        value &= 0xFF;

        switch (addr) {
            case 0x033000: // DMACTL
                this.control = value;
                if (value & 0x80) this.startDMA();
                break;

            case 0x033002: // DMASRC low
                this.src = (this.src & 0xFFFF00) | value;
                break;
            case 0x033003: // DMASRC mid
                this.src = (this.src & 0xFF00FF) | (value << 8);
                break;
            case 0x033004: // DMASRC high
                this.src = (this.src & 0x00FFFF) | (value << 16);
                break;

            case 0x033006: // DMADST low
                this.dst = (this.dst & 0xFFFF00) | value;
                break;
            case 0x033007: // DMADST mid
                this.dst = (this.dst & 0xFF00FF) | (value << 8);
                break;
            case 0x033008: // DMADST high
                this.dst = (this.dst & 0x00FFFF) | (value << 16);
                break;

            case 0x03300A: // DMACNT low
                this.count = (this.count & 0xFF00) | value;
                break;
            case 0x03300B: // DMACNT high
                this.count = (this.count & 0x00FF) | (value << 8);
                break;
        }
    }

    // -----------------------------
    // DMA 開始
    // -----------------------------
    startDMA() {
        if (this.active) return;

        this.active = true;

        const direction = (this.control >> 6) & 1; // 0=RAM→VRAM, 1=VRAM→RAM
        const type = this.control & 0x03;          // 転送タイプ（未使用）

        // CPU を止めて即時転送
        for (let i = 0; i < this.count; i++) {
            const s = (this.src + i) & 0xFFFFFF;
            const d = (this.dst + i) & 0xFFFFFF;

            if (direction === 0) {
                // RAM → VRAM
                const v = this.bus.read8(s);
                this.bus.write8(d, v);
            } else {
                // VRAM → RAM
                const v = this.bus.read8(d);
                this.bus.write8(s, v);
            }
        }

        this.active = false;
        this.control &= ~0x80; // 開始ビットクリア
    }
}

    class Emulator {
    constructor(romBanks) {
        // Bus（メモリマップ + デバイス）
        this.bus = new Bus(romBanks);

        // CPU（OM-C1）
        this.cpu = new CPU(this.bus);

        // PPU / APU / DMA / IO を後で接続
        this.bus.ppu = new PPU(this.bus);
        this.bus.apu = new APU(this.bus);
        this.bus.dma = new DMA(this.bus);
        this.bus.io  = new IO(this.bus);

        // 画面
        this.canvas = document.getElementById('screen');
        this.ctx = this.canvas.getContext('2d');

        // 1フレームあたりのCPUサイクル（仮）
        this.cyclesPerFrame = 100000; // 16MHz / 60fps ≒ 266k → とりあえず少なめ
    }

    // ROMをロード（32KB × 256バンク）
    loadROM(buffer) {
        const bankSize = 0x8000; // 32KB
        const romBanks = [];

        for (let i = 0; i < buffer.length; i += bankSize) {
            romBanks.push(buffer.slice(i, i + bankSize));
        }

        // Bus に再設定
        this.bus.rom = romBanks;

        console.log(`ROM Loaded: ${romBanks.length} banks`);
    }

    // 1フレーム実行
    frame() {
        let cycles = 0;

        while (cycles < this.cyclesPerFrame) {
            const before = this.cpu.cycles;
            this.cpu.step();
            cycles += (this.cpu.cycles - before);

            // PPU/APU のステップ
            this.bus.ppu.step();
            this.bus.apu.step();
        }

        // 画面更新
        this.bus.ppu.render(this.ctx);
    }

    // メインループ
    run() {
        const loop = () => {
            this.frame();
            requestAnimationFrame(loop);
        };
        requestAnimationFrame(loop);
    }
}


// 初期化とROM読み込みの紐付け
const emu = new Emulator();
document.getElementById('rom').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    const buffer = await file.arrayBuffer();
    emu.loadROM(new Uint8Array(buffer));
    emu.run();
});
